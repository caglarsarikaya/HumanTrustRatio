{% extends "base.html" %}
{% block title %}Trust Index — Proof of Humanity{% endblock %}

{% block content %}
<section class="mx-auto max-w-4xl px-6 py-16" id="result-root" data-id="{{ analysis_id }}">
  <div class="text-center mb-10">
    <h1 class="text-3xl font-extrabold tracking-tight text-gray-900">Trust Index Report</h1>
    <p class="text-gray-400 mt-2">Analysis ID: <code class="text-brand-600 bg-brand-50 px-2 py-0.5 rounded">{{ analysis_id }}</code></p>
  </div>

  <div id="loading" class="flex justify-center py-20">
    <svg class="animate-spin h-8 w-8 text-brand-500" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
    </svg>
  </div>

  <!-- Filled by JS -->
  <div id="report" class="hidden space-y-10"></div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/result.js"></script>
{% endblock %}
