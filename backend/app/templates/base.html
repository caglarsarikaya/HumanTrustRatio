<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Proof of Humanity{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eef7ff', 100:'#d9edff', 200:'#bce0ff', 300:'#8eccff', 400:'#53b0ff', 500:'#2b8dff', 600:'#0d6efd', 700:'#0b5ed7', 800:'#104eae', 900:'#134489' },
            mint:  { 50:'#effef4', 100:'#d9fce6', 200:'#b5f7cf', 300:'#7ceeab', 400:'#3cdd7e', 500:'#17c45d', 600:'#0fa34a', 700:'#0e803d', 800:'#106535', 900:'#0f532e' },
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    body { background: linear-gradient(135deg, #f0f7ff 0%, #faf5ff 50%, #f0fdf4 100%); min-height: 100vh; }
    @keyframes pulse-ring {
      0%   { transform: scale(0.9); opacity: 1; }
      100% { transform: scale(1.3); opacity: 0; }
    }
    .score-ring { animation: pulse-ring 2s ease-out infinite; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="h-full text-gray-800 antialiased">
  <div class="min-h-full flex flex-col">
    <header class="border-b border-gray-200 bg-white/80 backdrop-blur-md sticky top-0 z-50 shadow-sm">
      <div class="mx-auto max-w-5xl flex items-center justify-between px-6 py-4">
        <a href="/" class="text-xl font-bold tracking-tight text-gray-900">
          <span class="text-brand-600">PoH</span> &mdash; Proof of Humanity
        </a>
        <a href="/"
           class="inline-flex items-center gap-2 rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white
                  hover:bg-brand-700 shadow-sm hover:shadow transition-all">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
          </svg>
          New Search
        </a>
      </div>
    </header>

    <main class="flex-1">
      {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-gray-200 bg-white/60 py-6 text-center text-sm text-gray-400">
      HackPSU 2026
    </footer>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
